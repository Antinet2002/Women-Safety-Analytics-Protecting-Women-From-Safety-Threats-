<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">
    <h2>Incident Dashboard</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Threat</th>
            <th>Lat</th>
            <th>Lon</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
